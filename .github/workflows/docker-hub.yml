name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract metadata
        id: meta
        run: |
          SHA=${GITHUB_SHA::8}
          echo "sha=$SHA" >> $GITHUB_OUTPUT

          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$TAG" ]; then
            echo "version=$TAG" >> $GITHUB_OUTPUT
            echo "tags=therealphatt/loophole-unraid:$TAG,therealphatt/loophole-unraid:latest,therealphatt/loophole-unraid:$SHA" >> $GITHUB_OUTPUT
          else
            echo "version=$SHA" >> $GITHUB_OUTPUT
            echo "tags=therealphatt/loophole-unraid:$SHA,therealphatt/loophole-unraid:latest" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            GITHUB_SHA=${{ github.sha }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: Loophole ${{ github.ref }}
          body: "See https://github.com/phattbeats/loophole/compare/${{ github.event.before }}...${{ github.sha }} for full changelog."
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
